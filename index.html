<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreStream — Live Sports Scores</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #090909;
  --s1: #111111;
  --s2: #181818;
  --s3: #222222;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --t1: #f0f0f0;
  --t2: #888;
  --t3: #505050;
  --live: #22c55e;
  --live-bg: rgba(34,197,94,0.07);
  --ht-color: #f59e0b;
  --accent: #3b82f6;
  --danger: #ef4444;
  --r: 10px;
  --rs: 6px;
}

body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ---- HEADER ---- */
.header {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--live);
  animation: logo-pulse 2.5s ease-in-out infinite;
}

@keyframes logo-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
  50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.refresh-info {
  font-size: 11px;
  color: var(--t3);
  display: flex;
  align-items: center;
  gap: 5px;
}

.refresh-num {
  font-weight: 600;
  color: var(--t2);
  min-width: 20px;
  font-variant-numeric: tabular-nums;
}

.settings-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--rs);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--t2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: background 0.12s, color 0.12s;
  line-height: 1;
}

.settings-btn:hover { background: var(--s3); color: var(--t1); }

/* ---- CONTAINER ---- */
.container {
  max-width: 880px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* ---- SETTINGS PANEL ---- */
.settings-panel {
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 16px 18px;
  margin-bottom: 18px;
  display: none;
}

.settings-panel.open { display: block; }

.settings-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--t3);
  margin-bottom: 12px;
}

.key-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.key-label {
  font-size: 13px;
  color: var(--t2);
  white-space: nowrap;
}

.key-input {
  flex: 1;
  min-width: 200px;
  height: 34px;
  border-radius: var(--rs);
  border: 1px solid var(--border2);
  background: var(--s1);
  color: var(--t1);
  font-family: 'Outfit', system-ui, sans-serif;
  font-size: 13px;
  padding: 0 12px;
  outline: none;
  transition: border-color 0.15s;
}

.key-input:focus { border-color: var(--accent); }

.key-save {
  height: 34px;
  padding: 0 16px;
  border-radius: var(--rs);
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: 'Outfit', system-ui, sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.12s;
  white-space: nowrap;
}

.key-save:hover { opacity: 0.82; }

.key-note {
  font-size: 11px;
  color: var(--t3);
  line-height: 1.5;
}

.key-note a { color: #60a5fa; text-decoration: none; }
.key-note a:hover { text-decoration: underline; }

/* ---- FILTER BAR ---- */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.filter-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.fbtn {
  padding: 0 12px;
  height: 30px;
  border-radius: var(--rs);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--t2);
  font-size: 12px;
  font-weight: 500;
  font-family: 'Outfit', system-ui, sans-serif;
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

.fbtn:hover:not(.active) {
  background: var(--s2);
  color: var(--t1);
  border-color: var(--border2);
}

.fbtn.active {
  background: var(--t1);
  color: var(--bg);
  border-color: transparent;
}

.live-count {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 99px;
  background: rgba(239,68,68,0.18);
  color: #f87171;
  font-weight: 700;
  line-height: 1.5;
}

.fbtn.active .live-count {
  background: rgba(0,0,0,0.15);
  color: inherit;
}

.f-sep {
  width: 1px;
  height: 18px;
  background: var(--border2);
  margin: 0 2px;
}

.last-updated {
  margin-left: auto;
  font-size: 11px;
  color: var(--t3);
}

/* ---- STATES ---- */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 70px 20px;
  color: var(--t3);
  font-size: 13px;
}

.spinner {
  width: 26px;
  height: 26px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
  background: rgba(239,68,68,0.07);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--r);
  padding: 14px 16px;
  color: #f87171;
  font-size: 13px;
  line-height: 1.6;
}

.empty-state {
  padding: 50px 20px;
  text-align: center;
  color: var(--t3);
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: var(--r);
}

/* ---- LEAGUE SECTION ---- */
.league-section {
  margin-bottom: 12px;
}

.league-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 13px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: var(--r) var(--r) 0 0;
}

.sport-pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  flex-shrink: 0;
}

.sp-soccer     { background: rgba(59,130,246,0.14); color: #60a5fa; }
.sp-basketball { background: rgba(245,158,11,0.14); color: #fbbf24; }
.sp-football   { background: rgba(34,197,94,0.14);  color: #4ade80; }
.sp-hockey     { background: rgba(161,161,170,0.14); color: #a1a1aa; }
.sp-baseball   { background: rgba(244,63,94,0.14);  color: #fb7185; }

.league-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--t1);
}

.league-country {
  font-size: 11px;
  color: var(--t3);
}

.league-count {
  margin-left: auto;
  font-size: 10px;
  color: var(--t3);
}

/* ---- MATCH ROWS ---- */
.matches-list {
  border: 1px solid var(--border);
  border-radius: 0 0 var(--r) var(--r);
  overflow: hidden;
}

.match-row {
  display: grid;
  grid-template-columns: 1fr 116px 1fr;
  align-items: center;
  padding: 10px 14px;
  gap: 6px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  background: var(--s1);
  transition: background 0.1s;
}

.match-row:first-child { border-top: none; }
.match-row:hover { background: var(--s2); }
.match-row.row-live { background: var(--live-bg); }
.match-row.row-live:hover { background: rgba(34,197,94,0.1); }

.team-home { text-align: right; min-width: 0; }
.team-away { text-align: left;  min-width: 0; }

.team-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--t1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

.dim .team-name {
  color: var(--t3);
  font-weight: 400;
}

.score-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.score-num {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--t1);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.score-vs {
  font-size: 12px;
  color: var(--t3);
}

.st-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 3px;
}

.st-live { color: var(--live); }
.st-ht   { color: var(--ht-color); }
.st-ft   { color: var(--t3); letter-spacing: 0.06em; }
.st-up   { color: var(--t2); }

.blink-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--live);
  flex-shrink: 0;
  animation: blink 1.3s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    ScoreStream
  </div>
  <div class="header-right">
    <div class="refresh-info">
      Refreshes in <span class="refresh-num" id="countdown">60</span>s
    </div>
    <button class="settings-btn" id="settings-toggle" title="API settings">⚙</button>
  </div>
</header>

<div class="container">

  <!-- Settings panel -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-title">TheSportsDB API Key</div>
    <div class="key-row">
      <span class="key-label">API Key</span>
      <input class="key-input" id="api-key-input" type="text" placeholder='Enter your key, or type "123" for the free tier' />
      <button class="key-save" id="save-key-btn">Save & Reload</button>
    </div>
    <div class="key-note">
      The free public key is <strong style="color:var(--t2)">123</strong> — returns up to ~5 past and 5 upcoming matches per league.
      For full live scores and more history, get a Patreon key at
      <a href="https://www.thesportsdb.com/api.php" target="_blank">thesportsdb.com/api.php</a>.
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-group" id="sport-filter">
      <button class="fbtn active" data-sport="all">All sports</button>
      <button class="fbtn" data-sport="soccer">Soccer</button>
      <button class="fbtn" data-sport="basketball">Basketball</button>
      <button class="fbtn" data-sport="football">Am. Football</button>
    </div>
    <div class="f-sep"></div>
    <div class="filter-group" id="status-filter">
      <button class="fbtn active" data-status="all">All</button>
      <button class="fbtn" data-status="live">Live <span class="live-count" id="live-count">0</span></button>
      <button class="fbtn" data-status="ft">Results</button>
      <button class="fbtn" data-status="up">Upcoming</button>
    </div>
    <span class="last-updated" id="last-updated"></span>
  </div>

  <!-- Main content area -->
  <div id="main-content">
    <div class="loading-state">
      <div class="spinner"></div>
      Connecting to TheSportsDB…
    </div>
  </div>

</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const LEAGUES = [
  { id: 4328, name: 'Premier League',   country: 'England', sport: 'soccer'     },
  { id: 4335, name: 'La Liga',          country: 'Spain',   sport: 'soccer'     },
  { id: 4387, name: 'NBA',              country: 'USA',     sport: 'basketball' },
  { id: 4391, name: 'NFL',              country: 'USA',     sport: 'football'   },
];

const SPORT_LABEL = { soccer: 'Soccer', basketball: 'Basketball', football: 'Football' };

// ─── State ───────────────────────────────────────────────────────────────────
let apiKey = localStorage.getItem('sportsdb_key') || '123';
let sportFilter  = 'all';
let statusFilter = 'all';
let allMatches   = [];
let countdownVal = 60;
let countdownTimer;

// ─── Settings ────────────────────────────────────────────────────────────────
document.getElementById('api-key-input').value = apiKey;

document.getElementById('settings-toggle').addEventListener('click', () => {
  document.getElementById('settings-panel').classList.toggle('open');
});

document.getElementById('save-key-btn').addEventListener('click', () => {
  const v = document.getElementById('api-key-input').value.trim();
  if (!v) return;
  apiKey = v;
  localStorage.setItem('sportsdb_key', v);
  document.getElementById('settings-panel').classList.remove('open');
  loadAll();
});

// ─── Filters ─────────────────────────────────────────────────────────────────
document.getElementById('sport-filter').addEventListener('click', e => {
  const btn = e.target.closest('[data-sport]');
  if (!btn) return;
  sportFilter = btn.dataset.sport;
  document.querySelectorAll('#sport-filter .fbtn')
    .forEach(b => b.classList.toggle('active', b.dataset.sport === sportFilter));
  renderAll();
});

document.getElementById('status-filter').addEventListener('click', e => {
  const btn = e.target.closest('[data-status]');
  if (!btn) return;
  statusFilter = btn.dataset.status;
  document.querySelectorAll('#status-filter .fbtn')
    .forEach(b => b.classList.toggle('active', b.dataset.status === statusFilter));
  renderAll();
});

// ─── Countdown ───────────────────────────────────────────────────────────────
function startCountdown() {
  clearInterval(countdownTimer);
  countdownVal = 60;
  document.getElementById('countdown').textContent = countdownVal;
  countdownTimer = setInterval(() => {
    countdownVal--;
    document.getElementById('countdown').textContent = countdownVal;
    if (countdownVal <= 0) {
      clearInterval(countdownTimer);
      loadAll();
    }
  }, 1000);
}

// ─── Status parsing ──────────────────────────────────────────────────────────
function parseStatus(ev) {
  const s = (ev.strStatus || '').toLowerCase().trim();
  if (!s || s === 'ns' || s === 'not started' || s === 'postponed' || s === 'cancelled') return 'up';
  if (s === 'ht' || s === 'half time') return 'ht';
  if (s === 'ft' || s === 'aet' || s === 'pen' || s === 'match finished' || s === 'after extra time') return 'ft';
  if (['1h','2h','et','q1','q2','q3','q4','live','in progress','inprogress','p1','p2','p3'].some(x => s.includes(x))) return 'live';
  // If a score is present but no clear status, call it finished
  if (ev.intHomeScore !== null && ev.intHomeScore !== '' && ev.intHomeScore !== undefined) return 'ft';
  return 'up';
}

function getDisplayMinute(ev) {
  const s = (ev.strStatus || '').toUpperCase().trim();
  if (ev.strProgress)       return ev.strProgress;
  if (s === 'HT')           return 'HT';
  if (s === '1H')           return '1H';
  if (s === '2H')           return '2H';
  if (/Q[1-4]/.test(s))     return s;
  if (s === 'P1' || s === 'P2' || s === 'P3') return s;
  return 'LIVE';
}

// ─── Data fetching ───────────────────────────────────────────────────────────
async function fetchLeague(league) {
  const BASE = `https://www.thesportsdb.com/api/v1/json/${apiKey}`;
  const [pastRes, nextRes] = await Promise.all([
    fetch(`${BASE}/eventspastleague.php?id=${league.id}`).then(r => r.json()).catch(() => ({ events: [] })),
    fetch(`${BASE}/eventsnextleague.php?id=${league.id}`).then(r => r.json()).catch(() => ({ events: [] })),
  ]);

  const raw = [...(pastRes.events || []), ...(nextRes.events || [])];

  // Deduplicate
  const seen = new Set();
  return raw
    .filter(e => { if (seen.has(e.idEvent)) return false; seen.add(e.idEvent); return true; })
    .map(e => ({
      id:        e.idEvent,
      home:      e.strHomeTeam  || '—',
      away:      e.strAwayTeam  || '—',
      homeScore: e.intHomeScore,
      awayScore: e.intAwayScore,
      status:    parseStatus(e),
      minute:    getDisplayMinute(e),
      date:      e.dateEvent     || '',
      time:      e.strTime ? e.strTime.substring(0, 5) : '',
      league:    league.name,
      country:   league.country,
      sport:     league.sport,
      leagueId:  league.id,
    }));
}

async function loadAll() {
  clearInterval(countdownTimer);
  document.getElementById('main-content').innerHTML =
    '<div class="loading-state"><div class="spinner"></div>Fetching live scores…</div>';

  try {
    const results = await Promise.all(LEAGUES.map(fetchLeague));
    allMatches = results.flat();
    renderAll();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    startCountdown();
  } catch (err) {
    document.getElementById('main-content').innerHTML =
      `<div class="error-banner">
        ⚠ Could not load data. Check your API key in Settings, or verify your network connection.<br>
        <small style="color:var(--t3);margin-top:4px;display:block">${err.message}</small>
       </div>`;
    startCountdown();
  }
}

// ─── Rendering ───────────────────────────────────────────────────────────────
const STATUS_ORDER = { live: 0, ht: 1, ft: 2, up: 3 };

function renderAll() {
  // Live count badge
  const liveN = allMatches.filter(m => m.status === 'live' || m.status === 'ht').length;
  document.getElementById('live-count').textContent = liveN;

  // Filter
  const filtered = allMatches.filter(m => {
    const okSport  = sportFilter  === 'all' || m.sport === sportFilter;
    const okStatus = statusFilter === 'all'
      || (statusFilter === 'live' && (m.status === 'live' || m.status === 'ht'))
      || (statusFilter === 'ft'   && m.status === 'ft')
      || (statusFilter === 'up'   && m.status === 'up');
    return okSport && okStatus;
  });

  if (!filtered.length) {
    document.getElementById('main-content').innerHTML =
      '<div class="empty-state">No matches for this filter combination</div>';
    return;
  }

  // Group by league, preserving LEAGUES order
  const groups = {};
  filtered.forEach(m => {
    if (!groups[m.league]) groups[m.league] = { sport: m.sport, country: m.country, matches: [] };
    groups[m.league].matches.push(m);
  });

  // Sort within each group: live → ht → ft → upcoming; within upcoming by date
  Object.values(groups).forEach(g => {
    g.matches.sort((a, b) => {
      const so = STATUS_ORDER[a.status] - STATUS_ORDER[b.status];
      if (so !== 0) return so;
      return (a.date + a.time).localeCompare(b.date + b.time);
    });
  });

  let html = '';
  for (const lg of LEAGUES.map(l => l.name)) {
    const g = groups[lg];
    if (!g) continue;

    const pillClass = 'sp-' + g.sport;
    const sportLabel = SPORT_LABEL[g.sport] || g.sport;

    html += `
      <div class="league-section">
        <div class="league-header">
          <span class="sport-pill ${pillClass}">${sportLabel}</span>
          <span class="league-name">${lg}</span>
          <span class="league-country">${g.country}</span>
          <span class="league-count">${g.matches.length} match${g.matches.length !== 1 ? 'es' : ''}</span>
        </div>
        <div class="matches-list">`;

    g.matches.forEach(m => {
      const isLive   = m.status === 'live' || m.status === 'ht';
      const hasScore = m.homeScore !== null && m.homeScore !== '' && m.homeScore !== undefined;

      // Determine winner for dimming
      let winner = null;
      if (hasScore && m.status === 'ft') {
        const h = parseInt(m.homeScore, 10);
        const a = parseInt(m.awayScore, 10);
        if (h > a) winner = 'home';
        else if (a > h) winner = 'away';
      }

      const homeClass = 'team-home' + (winner === 'away' ? ' dim' : '');
      const awayClass = 'team-away' + (winner === 'home' ? ' dim' : '');

      // Score display
      const scoreHtml = hasScore
        ? `<span class="score-num">${m.homeScore}&nbsp;–&nbsp;${m.awayScore}</span>`
        : `<span class="score-vs">vs</span>`;

      // Status display
      let statusHtml;
      if (m.status === 'live') {
        statusHtml = `<span class="st-badge st-live"><span class="blink-dot"></span>${m.minute}</span>`;
      } else if (m.status === 'ht') {
        statusHtml = `<span class="st-badge st-ht">HT</span>`;
      } else if (m.status === 'ft') {
        statusHtml = `<span class="st-badge st-ft">FT</span>`;
      } else {
        const display = m.time
          ? m.time
          : m.date
            ? m.date.substring(5)   // show MM-DD for upcoming
            : '—';
        statusHtml = `<span class="st-badge st-up">${display}</span>`;
      }

      html += `
        <div class="match-row${isLive ? ' row-live' : ''}">
          <div class="${homeClass}"><span class="team-name">${escHtml(m.home)}</span></div>
          <div class="score-cell">${scoreHtml}${statusHtml}</div>
          <div class="${awayClass}"><span class="team-name">${escHtml(m.away)}</span></div>
        </div>`;
    });

    html += `</div></div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
